<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur vers 16h00</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-label: #94a3b8;
            --color-1: #38bdf8;
            --color-2: #4ade80;
            --color-3: #facc15;
            --color-4: #f472b6;
            --color-67: #ff6b35;
            --bar-active: #38bdf8;
            --bar-inactive: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            background: linear-gradient(to right, var(--color-1), var(--color-4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .counter-row {
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .counter-row:last-of-type {
            border-bottom: none;
            margin-bottom: 40px;
        }

        .label {
            font-size: 0.8rem;
            color: var(--text-label);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .value {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            word-break: break-all;
        }

        .row-1 .value { color: var(--color-1); }
        .row-2 .value { color: var(--color-2); }
        .row-3 .value { color: var(--color-3); }
        .row-4 .value { color: var(--color-4); font-size: 2rem; }

        /* --- COMPTEUR 67 --- */
        .row-67 {
            border: 1px solid rgba(255, 107, 53, 0.4);
            border-radius: 12px;
            background: rgba(255, 107, 53, 0.07);
            padding: 15px !important;
            position: relative;
            overflow: hidden;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        .row-67::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(255,107,53,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .row-67 .value {
            color: var(--color-67);
            font-size: 3.5rem;
            text-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
            transition: transform 0.1s ease, text-shadow 0.2s ease;
        }

        .row-67 .value.bump {
            transform: scale(1.15);
            text-shadow: 0 0 50px rgba(255, 107, 53, 0.9), 0 0 20px rgba(255, 107, 53, 0.6);
        }

        .row-67 .label {
            color: #ff9a6c;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .row-67-hint {
            font-size: 0.65rem;
            color: rgba(255, 107, 53, 0.5);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* --- STYLE DE LA BARRE --- */
        .seconds-bar-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(3px, 1fr)); 
            gap: 1px;
            background-color: var(--bar-inactive);
            padding: 2px;
            border-radius: 4px;
            opacity: 0.9;
        }

        .block {
            width: 100%;
            aspect-ratio: 1;
            background-color: var(--bar-active);
            border-radius: 1px;
        }

        .block.off {
            background-color: var(--bar-inactive);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; margin-bottom: 20px; }
            .value { font-size: 2.2rem; }
            .row-4 .value { font-size: 1.6rem; }
            .row-67 .value { font-size: 2.8rem; }
            .seconds-bar-container {
                grid-template-columns: repeat(auto-fill, minmax(2px, 1fr));
                gap: 1px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>En attente de 16h00</h1>
        
        <div class="counter-row row-1">
            <div class="label">Heures : Minutes : Secondes</div>
            <div class="value" id="hms-display">00:00:00</div>
        </div>

        <div class="counter-row row-2">
            <div class="label">Minutes : Secondes</div>
            <div class="value" id="ms-display">00:00</div>
        </div>

        <div class="counter-row row-3">
            <div class="label">Total Secondes</div>
            <div class="value" id="s-display">0</div>
        </div>

        <div class="counter-row row-4">
            <div class="label">Total Millisecondes</div>
            <div class="value" id="ms-total-display">0</div>
        </div>

        <!-- COMPTEUR 67 -->
        <div class="counter-row row-67">
            <div class="label">✦ Apparitions de "67"</div>
            <div class="value" id="count-67">0</div>
            <div class="row-67-hint">+1 chaque fois que "67" apparaît dans un compteur</div>
        </div>

        <div class="label" style="margin-bottom: 10px; width: 100%; text-align: left;">Progression de l'heure (3600s)</div>
        <div class="seconds-bar-container" id="seconds-bar"></div>
    </div>

    <script>
        // --- 1. GÉNÉRATION DE LA BARRE ---
        const barContainer = document.getElementById('seconds-bar');
        const totalBlocks = 3600;
        const blocksArray = [];

        for (let i = 0; i < totalBlocks; i++) {
            const block = document.createElement('div');
            block.classList.add('block');
            barContainer.appendChild(block);
            blocksArray.push(block);
        }

        let lastSecondsElapsed = -1;

        // --- 2. LOGIQUE DU COMPTEUR 67 ---
        let count67 = 0;
        let prev67Count = 0;
        const count67El = document.getElementById('count-67');

        // Compte combien de fois "67" apparaît dans une chaîne
        function countOccurrences67(str) {
            let count = 0;
            let idx = 0;
            while ((idx = str.indexOf('67', idx)) !== -1) {
                count++;
                idx += 2;
            }
            return count;
        }

        function bump67() {
            count67El.classList.remove('bump');
            // Forcer reflow pour relancer l'animation
            void count67El.offsetWidth;
            count67El.classList.add('bump');
            setTimeout(() => count67El.classList.remove('bump'), 200);
        }

        function getNext16h() {
            const now = new Date();
            const target = new Date();
            target.setHours(16, 0, 0, 0);
            if (now.getTime() > target.getTime()) {
                target.setDate(target.getDate() + 1);
            }
            return target;
        }

        let targetTime = getNext16h();

        function updateCountdown() {
            const now = new Date();
            const diff = targetTime - now;

            if (diff <= 0) {
                targetTime = getNext16h();
                document.getElementById('hms-display').innerText = "00:00:00";
                document.getElementById('ms-display').innerText = "00:00";
                document.getElementById('s-display').innerText = "0";
                document.getElementById('ms-total-display').innerText = "0";
                lastSecondsElapsed = -1; 
                requestAnimationFrame(updateCountdown);
                return;
            }

            // --- Calculs des compteurs ---
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);
            const totalMinutes = Math.floor(diff / (1000 * 60));
            const remainingSeconds = Math.floor((diff / 1000) % 60);
            const totalSeconds = Math.floor(diff / 1000);
            const totalMilliseconds = diff;

            const pad = (num) => num.toString().padStart(2, '0');

            const hmsStr       = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
            const msStr        = `${totalMinutes}:${pad(remainingSeconds)}`;
            const sStr         = totalSeconds.toLocaleString('fr-FR');
            const msTotalStr   = totalMilliseconds.toLocaleString('fr-FR');

            document.getElementById('hms-display').innerText     = hmsStr;
            document.getElementById('ms-display').innerText      = msStr;
            document.getElementById('s-display').innerText       = sStr;
            document.getElementById('ms-total-display').innerText = msTotalStr;

            // --- COMPTAGE DES "67" dans tous les affichages ---
            // On enlève les séparateurs de milliers (espace fine / espace normale) pour chercher dans les chiffres bruts
            const rawS    = totalSeconds.toString();
            const rawMs   = totalMilliseconds.toString();
            const rawHms  = `${pad(hours)}${pad(minutes)}${pad(seconds)}`;
            const rawMsStr = `${totalMinutes}${pad(remainingSeconds)}`;

            const newTotal67 =
                countOccurrences67(rawHms) +
                countOccurrences67(rawMsStr) +
                countOccurrences67(rawS) +
                countOccurrences67(rawMs);

            if (newTotal67 !== prev67Count) {
                const delta = newTotal67 - prev67Count;
                if (delta > 0) {
                    count67 += delta;
                    count67El.innerText = count67.toLocaleString('fr-FR');
                    bump67();
                }
                prev67Count = newTotal67;
            }

            // --- LOGIQUE DE LA BARRE ---
            const currentMin = now.getMinutes();
            const currentSec = now.getSeconds();
            const currentSecondsElapsed = (currentMin * 60) + currentSec;

            if (currentSecondsElapsed < lastSecondsElapsed) {
                blocksArray.forEach(b => b.classList.remove('off'));
                lastSecondsElapsed = currentSecondsElapsed;
            } else if (currentSecondsElapsed > lastSecondsElapsed) {
                for (let i = lastSecondsElapsed + 1; i <= currentSecondsElapsed; i++) {
                    if (blocksArray[i]) {
                        blocksArray[i].classList.add('off');
                    }
                }
                lastSecondsElapsed = currentSecondsElapsed;
            }

            requestAnimationFrame(updateCountdown);
        }

        updateCountdown();
    </script>
</body>
</html>
